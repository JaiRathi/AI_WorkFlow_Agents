version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qabuddy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: qabuddy-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../config/.env:/app/config/.env:ro
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PYTHONPATH=/app
    env_file:
      - ../config/.env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: qabuddy-streamlit
    command: streamlit run src/frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - QABUDDY_API_URL=http://api:8000
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: unless-stopped
