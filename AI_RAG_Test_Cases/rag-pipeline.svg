<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#111130"/></linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#064e3b"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#164e63"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="ga" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#451a03"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/></marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/></marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="800" height="380" rx="14" fill="url(#bg)"/>
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">RAG Test Cases Explorer — Pipeline</text>
  <!-- Top: Data Flow -->
  <text x="30" y="72" fill="#4ade80" font-size="10" font-weight="700" letter-spacing="1">DATA FLOW</text>
  <rect x="30" y="84" width="110" height="50" rx="8" fill="url(#gg)" filter="url(#sh)"/><text x="85" y="106" text-anchor="middle" fill="#fff" font-size="12">📄 File Source</text><text x="85" y="122" text-anchor="middle" fill="#a7f3d0" font-size="9">CSV / PDF / TXT</text>
  <line x1="140" y1="109" x2="178" y2="109" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="184" y="84" width="110" height="50" rx="8" fill="url(#gp)" filter="url(#sh)"/><text x="239" y="106" text-anchor="middle" fill="#fff" font-size="12">🔪 Chunking</text><text x="239" y="122" text-anchor="middle" fill="#c4b5fd" font-size="9">500 char / 100 ov</text>
  <line x1="294" y1="109" x2="332" y2="109" stroke="#6366f1" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="338" y="84" width="110" height="50" rx="8" fill="url(#gp)" filter="url(#sh)"/><text x="393" y="106" text-anchor="middle" fill="#fff" font-size="12">🧠 Embedding</text><text x="393" y="122" text-anchor="middle" fill="#c4b5fd" font-size="9">Mistral Embed</text>
  <line x1="448" y1="109" x2="486" y2="109" stroke="#6366f1" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="492" y="84" width="110" height="50" rx="8" fill="url(#gc)" filter="url(#sh)"/><text x="547" y="106" text-anchor="middle" fill="#fff" font-size="12">💾 Vector Store</text><text x="547" y="122" text-anchor="middle" fill="#a5f3fc" font-size="9">In-Memory</text>
  <!-- Down arrow -->
  <line x1="547" y1="134" x2="547" y2="176" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3"/><path d="M 542 166 L 547 176 L 552 166" fill="#06b6d4"/>
  <!-- Bottom: Query Flow -->
  <text x="30" y="198" fill="#67e8f9" font-size="10" font-weight="700" letter-spacing="1">QUERY FLOW</text>
  <rect x="30" y="210" width="110" height="50" rx="8" fill="url(#gp)" filter="url(#sh)"/><text x="85" y="232" text-anchor="middle" fill="#fff" font-size="12">❓ User Query</text><text x="85" y="248" text-anchor="middle" fill="#c4b5fd" font-size="9">Natural Language</text>
  <line x1="140" y1="235" x2="178" y2="235" stroke="#6366f1" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="184" y="210" width="110" height="50" rx="8" fill="url(#gc)" filter="url(#sh)"/><text x="239" y="232" text-anchor="middle" fill="#fff" font-size="12">🔍 Retrieve Top-K</text><text x="239" y="248" text-anchor="middle" fill="#a5f3fc" font-size="9">Cosine Similarity</text>
  <!-- Up connection -->
  <path d="M 239 210 L 239 170 L 547 170 L 547 176" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>
  <path d="M 239 200 L 242 210 L 236 210 Z" fill="#06b6d4"/>
  <line x1="294" y1="235" x2="332" y2="235" stroke="#06b6d4" stroke-width="2" marker-end="url(#ac)"/>
  <rect x="338" y="210" width="110" height="50" rx="8" fill="url(#ga)" filter="url(#sh)"/><text x="393" y="232" text-anchor="middle" fill="#fff" font-size="12">🤖 LLM Generate</text><text x="393" y="248" text-anchor="middle" fill="#fde68a" font-size="9">Groq Llama 3.3</text>
  <line x1="448" y1="235" x2="486" y2="235" stroke="#f59e0b" stroke-width="2" marker-end="url(#aa)"/>
  <rect x="492" y="210" width="110" height="50" rx="8" fill="url(#gg)" filter="url(#sh)"/><text x="547" y="232" text-anchor="middle" fill="#fff" font-size="12">📊 Results</text><text x="547" y="248" text-anchor="middle" fill="#a7f3d0" font-size="9">Chunks + Answer</text>
  <!-- Settings panel -->
  <rect x="630" y="84" width="150" height="176" rx="10" fill="#0a0a1a" stroke="#334155" stroke-width="1"/>
  <text x="705" y="106" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">Settings</text>
  <line x1="645" y1="114" x2="765" y2="114" stroke="#1e1e4a" stroke-width="1"/>
  <text x="640" y="134" fill="#06b6d4" font-size="9" font-weight="600">Langflow URL</text><text x="640" y="148" fill="#64748b" font-size="8">Optional RAG pipeline</text>
  <text x="640" y="168" fill="#6366f1" font-size="9" font-weight="600">Mistral Key</text><text x="640" y="182" fill="#64748b" font-size="8">For embeddings</text>
  <text x="640" y="202" fill="#f59e0b" font-size="9" font-weight="600">Groq Key</text><text x="640" y="216" fill="#64748b" font-size="8">For LLM generation</text>
  <text x="640" y="236" fill="#22c55e" font-size="9" font-weight="600">Top-K</text><text x="640" y="250" fill="#64748b" font-size="8">Results to retrieve</text>
  <!-- Bottom bar -->
  <rect x="30" y="300" width="750" height="60" rx="8" fill="#0a0a1a" stroke="#1e1e4a" stroke-width="1"/>
  <text x="50" y="322" fill="#94a3b8" font-size="10">Endpoints</text>
  <text x="50" y="344" fill="#64748b" font-size="9">/api/health</text><text x="180" y="344" fill="#64748b" font-size="9">Service status</text>
  <text x="320" y="344" fill="#64748b" font-size="9">/api/ingest</text><text x="450" y="344" fill="#64748b" font-size="9">Upload + chunk + embed</text>
  <text x="620" y="344" fill="#64748b" font-size="9">/api/query</text><text x="730" y="344" fill="#64748b" font-size="9">Search + generate</text>
</svg>
